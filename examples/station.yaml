tz: "America/Chicago"

# Base directory every channel writes under. Each channel's output folder is
# {output_base}/{identity}, where identity is the channel's `name` override or
# its config file stem. Used verbatim relative to the process CWD.
output_base: examples/output

# Each entry is a literal path or a glob (e.g. `channels/*.yaml`), resolved
# relative to this file's directory. A glob expands to every match.
channels:
  - channels/lavfi-test.yaml
  - channels/diehard.yaml
  - channels/trending.yaml
  - channels/showcase.yaml
  - channels/marquee.yaml
  - channels/starwars.yaml
