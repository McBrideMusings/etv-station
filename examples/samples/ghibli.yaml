# Sample S9 — Studio / brand channel (the studio tier).
#
# A *query* channel of everything from one studio, resolved by the promoted
# `item.studio` column and played alphabetically. This is the CLEAN tier: Studio
# Ghibli is a single production company, so a plain `studio ==` string is enough.
#
# Two harder brand tiers use `item.labels` instead — the same channel shape over
# a different metadata source, because one `studio` string isn't enough for a
# brand:
#   - A24     — a distributor, not the production company → a user-applied Label:
#               'item.labels.contains("A24")'
#   - Disney  — an umbrella spanning Pixar / Marvel / Lucasfilm / … sub-studios,
#               where 'item.studio == "Disney"' matches almost nothing → a Label:
#               'item.labels.contains("Disney")'
# The `studio_brand_sample` acceptance test proves all three query forms.
#
# Registered in examples/station.yaml via the `samples/*.yaml` glob, so a
# dev-run serves it live. Being a query channel it resolves to nothing
# unless the station's `catalog_path` points at a populated catalog. Its
# resolution is also proven by the `studio_brand_sample` acceptance test.
window_days: 1
roll_interval: "60s"
retention_days: 1

rule:
  blocks:
    - mode: "all"
      order: "title:asc"
      program:
        title: "Studio Ghibli"
        categories: ["Movie", "Anime"]
      entries:
        - kind: query
          query: 'item.studio == "Studio Ghibli"'
