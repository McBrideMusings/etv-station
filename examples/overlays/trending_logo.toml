# Trending channel — logo bottom-right, channel-name text bottom-left.
# Width must match the channel's output resolution.
width = 1280
height = 720
framerate = 30
pixel_format = "rgba8"

[[layers]]
type = "logo"
path = "../assets/trending-logo.png"
corner = "bottom_right"
margin = 24
height = 96

[[layers]]
type = "text"
content = "TRENDING"
font_family = "Helvetica"
font_size = 48.0
color = [255, 255, 255, 230]
corner = "bottom_left"
margin = 40
