name: test
window_days: 1
# Deliberately overrides the 6h default to 1h — the one committed channel that
# exercises a non-default chunk size, so chunking is checked at !=6 on every
# dev-run. See ADR 0003.
chunk_hours: 1
roll_interval: "60s"
retention_days: 1

overlay:
  config: "../../crates/etv-overlay/fixtures/channel_watermark.toml"

rule:
  blocks:
    - mode: "all"
      order: "manual"
      entries:
        - kind: item
          in_point: "0s"
          out_point: "30s"
          source:
            kind: lavfi
            params: "testsrc=size=1280x720:rate=30 [out0]; sine=frequency=440 [out1]"
          program:
            title: "Color Bars"
            description: "30-second SMPTE-style test pattern with reference tone."
            categories: ["Test"]

        - kind: item
          in_point: "0s"
          out_point: "60s"
          source:
            kind: lavfi
            params: "smptebars=size=1280x720:rate=30 [out0]; sine=frequency=880 [out1]"
          program:
            title: "SMPTE Bars"
            description: "Standard SMPTE pattern for one minute with 880 Hz tone."
            categories: ["Test"]

        - kind: item
          in_point: "0s"
          out_point: "90s"
          source:
            kind: lavfi
            params: "mandelbrot=size=1280x720:rate=30 [out0]; sine=frequency=220 [out1]"
          program:
            title: "Mandelbrot"
            description: "Animated mandelbrot zoom for 90 seconds with low tone."
            categories: ["Test"]
